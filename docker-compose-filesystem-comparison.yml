services:
  filesystem-benchmark:
    build:
      context: .
      dockerfile: Dockerfile.filesystem-comparison
    container_name: razorfs-filesystem-comparison
    privileged: true  # Required for mounting filesystems
    volumes:
      - ./results:/app/results
      - ./test-data:/app/test-data
    environment:
      - DISPLAY=${DISPLAY}
      - BENCHMARK_MODE=full
      - GRAPH_OUTPUT=true
    working_dir: /app
    command: ["./run-filesystem-comparison.sh", "full"]
    cap_add:
      - SYS_ADMIN  # Required for mount operations
    devices:
      - /dev/loop0:/dev/loop0
      - /dev/loop1:/dev/loop1
      - /dev/loop2:/dev/loop2
      - /dev/loop3:/dev/loop3
    tmpfs:
      - /tmp/fs-images:exec,size=2g
    shm_size: 1g
    mem_limit: 8g
    cpus: '4.0'

  quick-test:
    extends: filesystem-benchmark
    container_name: razorfs-quick-test
    environment:
      - BENCHMARK_MODE=quick
      - GRAPH_OUTPUT=false
    command: ["./run-filesystem-comparison.sh", "quick"]
    mem_limit: 4g
    cpus: '2.0'

  diagnostics:
    extends: filesystem-benchmark
    container_name: razorfs-diagnostics
    environment:
      - BENCHMARK_MODE=diagnostics
      - GRAPH_OUTPUT=false
    command: ["./diagnose-filesystems.sh"]
    mem_limit: 2g
    cpus: '1.0'